apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/LeDangQuocAn/aws-eks-ecommerce-devops.git
      targetRevision: main
      path: src/orders/chart
      helm:
        valueFiles:
          - $values/services/orders/values.yaml
    - repoURL: https://github.com/LeDangQuocAn/ecommerce-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
